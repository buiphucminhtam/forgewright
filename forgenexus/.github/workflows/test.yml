name: Test Suite

on:
  push:
    branches: [main, develop, 'phase4/**']
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:
  # Unit & Type Tests
  unit-tests:
    name: Unit Tests (Node ${{ env.NODE_VERSION }})
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: forgenexus/package-lock.json
      
      - name: Install dependencies
        working-directory: ./forgenexus
        run: npm ci
      
      - name: Build TypeScript
        working-directory: ./forgenexus
        run: npm run build
      
      - name: Type check
        working-directory: ./forgenexus
        run: npx tsc --noEmit
      
      - name: Run unit tests
        working-directory: ./forgenexus
        run: npm test -- --coverage --reporter=basic
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: forgenexus/coverage/
          retention-days: 14
  
  # Integration Tests
  integration-tests:
    name: Integration Tests (Node ${{ env.NODE_VERSION }})
    runs-on: ubuntu-latest
    needs: unit-tests
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: forgenexus/package-lock.json
      
      - name: Install dependencies
        working-directory: ./forgenexus
        run: npm ci
      
      - name: Build TypeScript
        working-directory: ./forgenexus
        run: npm run build
      
      - name: Run E2E tests
        working-directory: ./forgenexus
        run: npm test -- src/e2e/
      
      - name: Run integration tests
        working-directory: ./forgenexus
        run: npm run test:integration
  
  # Evaluation Tests
  eval-tests:
    name: Evaluation Suite (Node ${{ env.NODE_VERSION }})
    runs-on: ubuntu-latest
    needs: unit-tests
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: forgenexus/package-lock.json
      
      - name: Install dependencies
        working-directory: ./forgenexus
        run: npm ci
      
      - name: Build TypeScript
        working-directory: ./forgenexus
        run: npm run build
      
      - name: Run evaluation suite
        working-directory: ./forgenexus
        run: npm run eval
      
      - name: Upload eval results
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: |
            forgenexus/benchmarks/eval-results*.json
            forgenexus/benchmarks/results/*.json
          retention-days: 30
  
  # Multi-Node Compatibility
  node-compatibility:
    name: Node ${{ matrix.node-version }} Compatibility
    runs-on: ubuntu-latest
    needs: unit-tests
    strategy:
      fail-fast: false
      matrix:
        node-version: ['18', '22']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: forgenexus/package-lock.json
      
      - name: Install dependencies
        working-directory: ./forgenexus
        run: npm ci
      
      - name: Build TypeScript
        working-directory: ./forgenexus
        run: npm run build
      
      - name: Run tests
        working-directory: ./forgenexus
        run: npm test
  
  # Code Quality Checks
  quality-checks:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: unit-tests
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: forgenexus/package-lock.json
      
      - name: Install dependencies
        working-directory: ./forgenexus
        run: npm ci
      
      - name: Run ESLint
        working-directory: ./forgenexus
        run: npm run lint || true  # Allow warnings for now
      
      - name: Check formatting
        working-directory: ./forgenexus
        run: npm run format:check
  
  # Test Summary
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, eval-tests, node-compatibility, quality-checks]
    if: always()
    
    steps:
      - name: Download all test artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
      
      - name: Generate summary
        run: |
          echo "## Test Suite Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ${{ needs.integration-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Evaluation Suite | ${{ needs.eval-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Node 18 Compatibility | ${{ needs.node-compatibility.outputs.node-18 }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Node 22 Compatibility | ${{ needs.node-compatibility.outputs.node-22 }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Code Quality | ${{ needs.quality-checks.result }} |" >> $GITHUB_STEP_SUMMARY
