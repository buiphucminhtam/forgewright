name: Benchmark Comparison

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  # Run benchmarks on PR branch
  benchmark-pr:
    name: Benchmark PR Branch
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: forgenexus/package-lock.json
      
      - name: Install dependencies
        working-directory: ./forgenexus
        run: npm ci
      
      - name: Build TypeScript
        working-directory: ./forgenexus
        run: npm run build
      
      - name: Run benchmarks (PR branch)
        id: pr-benchmarks
        working-directory: ./forgenexus
        run: |
          npm run benchmark:ci 2>&1 | tee benchmark-pr-results.txt
        continue-on-error: true
      
      - name: Upload PR benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-pr-results
          path: |
            forgenexus/benchmarks/results/
            forgenexus/benchmark-pr-results.txt
          retention-days: 7

  # Fetch baseline from main branch
  baseline:
    name: Fetch Baseline
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: forgenexus/package-lock.json
      
      - name: Install dependencies
        working-directory: ./forgenexus
        run: npm ci
      
      - name: Build TypeScript
        working-directory: ./forgenexus
        run: npm run build
      
      - name: Run benchmarks (main baseline)
        id: baseline-benchmarks
        working-directory: ./forgenexus
        run: |
          npm run benchmark:ci 2>&1 | tee benchmark-baseline-results.txt
        continue-on-error: true
      
      - name: Upload baseline results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-baseline
          path: |
            forgenexus/benchmarks/results/
            forgenexus/benchmark-baseline-results.txt
          retention-days: 7

  # Compare and comment on PR
  compare-and-comment:
    name: Compare Benchmarks
    runs-on: ubuntu-latest
    needs: [benchmark-pr, baseline]
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Download PR results
        uses: actions/download-artifact@v4
        with:
          name: benchmark-pr-results
          path: ./pr-results
      
      - name: Download baseline results
        uses: actions/download-artifact@v4
        with:
          name: benchmark-baseline
          path: ./baseline-results
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Compare benchmarks
        id: comparison
        run: |
          cd forgenexus
          
          echo "## Performance Comparison Report" > ../comparison.md
          echo "" >> ../comparison.md
          
          # Check if we have results
          if [ -f "./benchmark-pr-results.txt" ]; then
            echo "### PR Branch Results" >> ../comparison.md
            echo '```' >> ../comparison.md
            cat ./benchmark-pr-results.txt >> ../comparison.md
            echo '```' >> ../comparison.md
            echo "" >> ../comparison.md
          fi
          
          if [ -f "./benchmark-baseline-results.txt" ]; then
            echo "### Main Branch Baseline" >> ../comparison.md
            echo '```' >> ../comparison.md
            cat ./benchmark-baseline-results.txt >> ../comparison.md
            echo '```' >> ../comparison.md
            echo "" >> ../comparison.md
          fi
          
          echo "### Summary" >> ../comparison.md
          
          # Parse results for summary (simplified)
          if [ -f "benchmarks/results/benchmark-*.json" ]; then
            echo "| Metric | PR | Baseline | Change |" >> ../comparison.md
            echo "|--------|-----|----------|--------|" >> ../comparison.md
            
            for result in benchmarks/results/benchmark-*.json; do
              if [ -f "$result" ]; then
                name=$(basename "$result" .json)
                echo "| $name | See JSON | See JSON | - |" >> ../comparison.md
              fi
            done
          else
            echo "_No benchmark JSON results available for comparison._" >> ../comparison.md
          fi
          
          cat ../comparison.md
      
      - name: Post benchmark comparison comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const comparison = fs.readFileSync('comparison.md', 'utf8');
            
            const issue_number = context.issue.number;
            
            // Check for existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number
            });
            
            const existingComment = comments.find(c => 
              c.user.login === 'github-actions[bot]' && 
              c.body.includes('## Performance Comparison Report')
            );
            
            const commentBody = `## Performance Comparison Report

This PR has been benchmarked against the main branch baseline.

${comparison}

---
_🤖 Automated benchmark comparison by GitHub Actions_`;
            
            if (existingComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: commentBody
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue_number,
                body: commentBody
              });
            }
