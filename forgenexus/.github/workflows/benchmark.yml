name: Performance Benchmark

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  benchmark:
    name: Run Performance Benchmarks
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: ['18', '20', '22']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      
      - name: Get npm cache directory
        id: npm-cache
        run: |
          echo "dir=$(npm config get cache)" >> $GITHUB_OUTPUT
      
      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.npm-cache.outputs.dir }}
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-
      
      - name: Install dependencies
        working-directory: ./forgenexus
        run: npm ci
      
      - name: Build TypeScript
        working-directory: ./forgenexus
        run: npm run build
      
      - name: Run benchmarks
        working-directory: ./forgenexus
        run: npm run benchmark:ci
        env:
          CI: true
      
      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ matrix.node-version }}
          path: |
            forgenexus/benchmarks/results/
          retention-days: 30
      
      - name: Publish benchmark results
        if: github.event_name == 'pull_request'
        uses: benchmark-action/github-action@v1
        with:
          instrumented-command: "npm run benchmark"
          output-file-path: ./benchmark-output.txt
          filter-delay: 5000

  benchmark-summary:
    name: Benchmark Summary
    runs-on: ubuntu-latest
    needs: benchmark
    if: always()
    
    steps:
      - name: Download all benchmark results
        uses: actions/download-artifact@v4
        with:
          path: ./results
      
      - name: Generate summary
        run: |
          echo "## Performance Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          for dir in ./results/benchmark-results-*/; do
            for file in "$dir"*.json; do
              if [ -f "$file" ]; then
                echo "### Node $(basename $dir | grep -oP '\d+$')" >> $GITHUB_STEP_SUMMARY
                echo '```json' >> $GITHUB_STEP_SUMMARY
                cat "$file" >> $GITHUB_STEP_SUMMARY
                echo '```' >> $GITHUB_STEP_SUMMARY
                echo "" >> $GITHUB_STEP_SUMMARY
              fi
            done
          done
