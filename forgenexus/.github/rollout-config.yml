# ============================================================
# ForgeNexus Staged Rollout Configuration
# ============================================================
# This file defines the rollout strategy for the Anti-Hallucination
# module across dev, staging, and production environments.
# ============================================================

# Rollout Stages
rollout:
  # Sequential stages with dependency chain
  stages:
    - name: smoke-tests
      environment: dev
      trigger:
        - all-branches
        - workflow_dispatch
      continueOnFailure: false
      timeout: 5m
      description: "Fast smoke tests for basic functionality"
    
    - name: integration-tests
      environment: dev
      trigger:
        - main
        - develop
        - 'phase4/**'
        - workflow_dispatch
      requires: [smoke-tests]
      continueOnFailure: false
      timeout: 15m
      description: "Full test suite with evaluation"
    
    - name: staging
      environment: staging
      trigger:
        - 'alpha'
        - 'beta'
        - 'rc'
        - workflow_dispatch
      requires: [integration-tests]
      continueOnFailure: false
      autoPromote: false
      timeout: 30m
      description: "Staging deployment with acceptance tests"
    
    - name: production
      environment: production
      trigger:
        - release-tags  # v1.0.0, v1.0.1, etc.
        - workflow_dispatch
      requires: [staging]
      continueOnFailure: false
      autoPromote: false
      concurrency: production
      timeout: 60m
      description: "Production release with rollback gate"

# Quality Gates
gates:
  # All gates must pass for promotion
  tests:
    requiredPassRate: 100
    allowSkipped: false
    coverage:
      minimum: 70
      warnBelow: 80
  
  benchmark:
    passRequired: true
    regressionThreshold: 0.10  # 10% regression allowed
    metrics:
      skepticLatency:
        target: 2000  # ms
        maxAcceptable: 3000
      confidenceCalc:
        target: 100  # ms
        maxAcceptable: 200
      ragRetrieval:
        target: 500  # ms
        maxAcceptable: 1000
  
  evaluation:
    ece:
      target: 0.1
      maxAcceptable: 0.15
    hallucinationRate:
      target: 0.05  # 5%
      maxAcceptable: 0.10  # 10%
    citationAccuracy:
      target: 0.90  # 90%
      minimum: 0.85

# Feature Flags Configuration
featureFlags:
  # Default rollout percentages by stage
  defaultRollout: 10
  maxRollout: 100
  
  # Rollback thresholds
  rollbackThreshold:
    errorRate: 5  # percent
    latencyP99: 3000  # ms
    hallucinationRate: 0.10  # 10%
  
  # Anti-hallucination module flags
  flags:
    verify:
      default: true
      description: "Enable skeptic verification"
    strict:
      default: false
      description: "High confidence threshold (0.85)"
    noVerify:
      default: false
      description: "Fast bypass mode"
    skeptic:
      default: true
      description: "Enable skeptic agent"
    semanticEnergy:
      default: true
      description: "Enable uncertainty quantification"

# Environment Configuration
environments:
  dev:
    url: http://localhost:3000
    verify: true
    strict: false
    rolloutPercent: 100
    verifyEndpoints: true
    metricsEnabled: true
    description: "Development environment - full access"
  
  staging:
    url: https://staging.forgenexus.local
    verify: true
    strict: false
    rolloutPercent: 50
    verifyEndpoints: true
    metricsEnabled: true
    description: "Staging environment - pre-release testing"
  
  production:
    url: https://forgenexus.local
    verify: true
    strict: false
    rolloutPercent: 10  # Start small, increase after stability
    verifyEndpoints: true
    metricsEnabled: true
    requireApproval: true
    description: "Production environment - gradual rollout"

# Monitoring Configuration
monitoring:
  # Metrics to track
  metrics:
    - verificationAttempts
    - verificationPassed
    - verificationFailed
    - citationAccuracy
    - averageConfidence
    - skepticLatency
    - ragRetrievalLatency
    - hallucinationRate
    - errorRate
  
  # Alert thresholds
  alerts:
    errorRate:
      warning: 2  # percent
      critical: 5
    latencyP99:
      warning: 2000  # ms
      critical: 5000
    hallucinationRate:
      warning: 0.05
      critical: 0.10
  
  # Dashboard settings
  dashboard:
    enabled: true
    refreshInterval: 30  # seconds
    retentionDays: 30

# Rollback Configuration
rollback:
  # Auto-rollback triggers
  triggers:
    - errorRate > 5
    - latencyP99 > 5000
    - hallucinationRate > 0.10
    - evaluation.ece > 0.15
  
  # Rollback procedure
  procedure:
    1: Set FORCE_NO_VERIFY=1
    2: Notify team via Slack/Teams
    3: Create incident issue
    4: Investigate root cause
    5: Deploy fix or rollback version
  
  # Recovery
  recovery:
    waitTime: 60  # minutes before retry
    maxRetries: 3

# Version Management
versions:
  # Semantic versioning rules
  semantic:
    major:
      - Breaking changes to API
      - Major refactoring
      - New major features
    minor:
      - New features
      - Backward compatible changes
      - Performance improvements
    patch:
      - Bug fixes
      - Documentation updates
      - Minor improvements
  
  # Prerelease channels
  prerelease:
    alpha:
      suffix: alpha
      stability: low
      audience: internal
    beta:
      suffix: beta
      stability: medium
      audience: beta testers
    rc:
      suffix: rc
      stability: high
      audience: early adopters

# Notifications
notifications:
  channels:
    - github  # GitHub notifications
    # - slack   # Uncomment and configure for Slack
    # - email   # Uncomment and configure for email
  
  events:
    - rollout_started
    - stage_completed
    - stage_failed
    - rollback_triggered
    - rollback_completed
    - production_deployed
