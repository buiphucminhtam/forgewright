# Docker Compose for Graphiti + Neo4j
# Usage: docker-compose -f docker-compose.graphiti.yml up -d

services:
  neo4j:
    image: neo4j:latest
    container_name: forgewright-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=none
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "neo4j", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  neo4j_data:
    driver: local
