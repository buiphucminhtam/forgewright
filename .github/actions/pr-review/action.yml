name: ForgeNexus PR Review Action

description: |
  GitHub Action for ForgeNexus PR Review — Blast radius analysis + OpenAPI contract checking.
  
  This action runs ForgeNexus PR Review on pull requests and posts a comment with:
  - Blast radius analysis (affected modules, breaking changes, risk level)
  - OpenAPI contract breaking change detection (optional)
  - Recommended reviewers based on affected modules

inputs:
  openapi-enabled:
    description: Enable OpenAPI contract checking
    required: false
    default: 'false'
  openapi-specs:
    description: Space-separated list of OpenAPI spec paths
    required: false
    default: ''
  min-risk-level:
    description: Minimum risk level to block merge
    required: false
    default: 'MEDIUM'
  comment-mode:
    description: |
      Comment mode: 'always' (always post), 'changes' (only on changes), 'never'
    required: false
    default: 'always'
  fail-on-critical:
    description: Fail workflow on CRITICAL risk level
    required: false
    default: 'true'
  fail-on-high:
    description: Fail workflow on HIGH risk level
    required: false
    default: 'false'
  dry-run:
    description: Dry run mode — no changes or comments will be posted
    required: false
    default: 'false'
  token:
    description: GitHub token (defaults to github.token)
    required: false
    default: ${{ github.token }}

outputs:
  risk_level:
    description: Detected risk level (LOW, MEDIUM, HIGH, CRITICAL)
    value: ${{ steps.analysis.outputs.risk_level }}
  files_changed:
    description: Number of files changed
    value: ${{ steps.analysis.outputs.files_changed }}
  symbols_changed:
    description: Number of symbols changed
    value: ${{ steps.analysis.outputs.symbols_changed }}
  breaking_count:
    description: Number of breaking changes detected
    value: ${{ steps.analysis.outputs.breaking_count }}
  has_openapi_breaking:
    description: Whether OpenAPI breaking changes were detected
    value: ${{ steps.openapi.outputs.has_breaking || 'false' }}

runs:
  using: composite
  steps:
    - name: Checkout PR
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install ForgeNexus
      shell: bash
      run: npm install -g forgenexus

    - name: Setup environment
      shell: bash
      id: setup
      run: |
        echo "base_ref=${{ github.base_ref }}" >> $GITHUB_OUTPUT
        echo "pr_number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
        
        if [ "${{ inputs.dry-run }}" == "true" ]; then
          echo "mode=DRY RUN" >> $GITHUB_OUTPUT
        else
          echo "mode=LIVE" >> $GITHUB_OUTPUT
        fi

    # ─── ForgeNexus Blast Radius Analysis ───────────────────────────────────────
    - name: Run ForgeNexus PR Review
      shell: bash
      id: analysis
      env:
        GH_TOKEN: ${{ inputs.token }}
      run: |
        DRY_RUN_FLAG=""
        if [ "${{ steps.setup.outputs.mode }}" == "DRY RUN" ]; then
          DRY_RUN_FLAG="--dry-run"
          echo "🔍 DRY RUN MODE — No changes will be made"
        fi
        
        echo "report<<EOF" >> $GITHUB_OUTPUT
        
        # Run ForgeNexus PR Review
        if npx forgenexus pr-review "${{ steps.setup.outputs.base_ref }}" HEAD $DRY_RUN_FLAG 2>/dev/null; then
          echo "✅ ForgeNexus analysis complete"
        else
          echo "⚠️ ForgeNexus index not available — running basic analysis"
          echo "" >> $GITHUB_OUTPUT
          echo "## Basic Diff Analysis" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
        fi
        
        echo "EOF" >> $GITHUB_OUTPUT
        
        # Extract metrics
        FILES_CHANGED=$(git diff --name-status "${{ steps.setup.outputs.base_ref }}" HEAD 2>/dev/null | wc -l | tr -d ' ')
        BREAKING_COUNT=$(git diff --name-status "${{ steps.setup.outputs.base_ref }}" HEAD 2>/dev/null | grep '^D' | wc -l | tr -d ' ')
        
        # Determine risk level
        if [ "$BREAKING_COUNT" -gt 0 ]; then
          RISK="HIGH"
        elif [ "$FILES_CHANGED" -gt 20 ]; then
          RISK="MEDIUM"
        else
          RISK="LOW"
        fi
        
        echo "files_changed=$FILES_CHANGED" >> $GITHUB_OUTPUT
        echo "symbols_changed=0" >> $GITHUB_OUTPUT
        echo "breaking_count=$BREAKING_COUNT" >> $GITHUB_OUTPUT
        echo "risk_level=$RISK" >> $GITHUB_OUTPUT

    # ─── OpenAPI Contract Check ─────────────────────────────────────────────────
    - name: Setup oasdiff
      if: inputs.openapi-enabled == 'true'
      shell: bash
      run: |
        curl -sSL https://raw.githubusercontent.com/oasdiff/oasdiff/main/get.sh | bash -s -- -b v1.0.0

    - name: Run OpenAPI contract check
      if: inputs.openapi-enabled == 'true'
      shell: bash
      id: openapi
      env:
        GH_TOKEN: ${{ inputs.token }}
      run: |
        HAS_BREAKING=false
        DETAILS=""
        
        # Get spec list
        if [ -n "${{ inputs.openapi-specs }}" ]; then
          SPECS="${{ inputs.openapi-specs }}"
        else
          SPECS=$(find . -type f \( -name "*.yaml" -o -name "*.yml" \) \
            \( -path "*/openapi*" -o -path "*/api/*" -o -name "swagger*" \) \
            -not -path "*/node_modules/*" 2>/dev/null | head -10 || echo "")
        fi
        
        for spec in $SPECS; do
          if [ ! -f "$spec" ]; then
            echo "⚠️ Spec not found in HEAD: $spec"
            continue
          fi
          
          BASE_SPEC="origin/${{ steps.setup.outputs.base_ref }}:$spec"
          if [ ! -f "$BASE_SPEC" ]; then
            echo "ℹ️ New spec (not in base): $spec"
            continue
          fi
          
          echo "Checking: $spec"
          RESULT=$(oasdiff breaking "$BASE_SPEC" "HEAD:$spec" 2>&1 || echo "")
          
          if [ -n "$RESULT" ]; then
            HAS_BREAKING=true
            DETAILS="${DETAILS}\n\n### $spec\n${RESULT}"
          fi
        done
        
        echo "has_breaking=$HAS_BREAKING" >> $GITHUB_OUTPUT
        echo "details<<EOF" >> $GITHUB_OUTPUT
        echo -e "$DETAILS" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    # ─── Post PR Comment ─────────────────────────────────────────────────────────
    - name: Post PR Comment
      if: >-
        inputs.dry-run != 'true' && (
          inputs.comment-mode == 'always' ||
          (inputs.comment-mode == 'changes' && steps.analysis.outputs.files_changed != '0')
        )
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.token }}
        script: |
          const baseRef = '${{ steps.setup.outputs.base_ref }}';
          const riskLevel = '${{ steps.analysis.outputs.risk_level }}';
          const filesChanged = '${{ steps.analysis.outputs.files_changed }}';
          const breakingCount = '${{ steps.analysis.outputs.breaking_count }}';
          const hasOpenApiBreaking = '${{ steps.openapi.outputs.has_breaking || 'false' }}' === 'true';
          const openApiDetails = `${{ steps.openapi.outputs.details || '' }}`;
          
          const riskEmoji = {
            'LOW': '🟢',
            'MEDIUM': '🟡', 
            'HIGH': '🟠',
            'CRITICAL': '🔴'
          };
          
          const riskDescriptions = {
            'LOW': 'Low risk — additive changes only',
            'MEDIUM': 'Medium risk — review recommended',
            'HIGH': 'High risk — breaking changes detected',
            'CRITICAL': 'Critical risk — significant blast radius'
          };
          
          let body = [
            `## 🔍 ForgeNexus PR Review`,
            ``,
            `| Metric | Value |`,
            `|--------|-------|`,
            `| Base | \`${baseRef}\` → \`HEAD\` |`,
            `| Files Changed | ${filesChanged} |`,
            `| Breaking Changes | ${breakingCount} |`,
            `| Risk Level | ${riskEmoji[riskLevel] || '⚪'} **${riskLevel}** |`,
            ``,
            riskDescriptions[riskLevel] ? `> ${riskDescriptions[riskLevel]}` : '',
            ``,
          ];
          
          if (hasOpenApiBreaking) {
            body.push(
              `## ⚠️ OpenAPI Breaking Changes Detected`,
              ``,
              openApiDetails,
              ``
            );
          }
          
          body.push(
            `---`,
            `*🤖 Generated by [ForgeNexus](https://github.com/buiphucminhtam/forgewright) | [Configure](https://github.com/buiphucminhtam/forgewright/wiki/ForgeNexus-Enterprise)*`
          );
          
          const comments = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: ${{ steps.setup.outputs.pr_number }},
          });
          
          const existingComment = comments.data.find(c => 
            c.user.login === 'github-actions[bot]' && 
            c.body.includes('ForgeNexus PR Review')
          );
          
          if (existingComment) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existingComment.id,
              body: body.filter(Boolean).join('\n'),
            });
            console.log('Updated existing ForgeNexus comment');
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.setup.outputs.pr_number }},
              body: body.filter(Boolean).join('\n'),
            });
            console.log('Created new ForgeNexus comment');
          }

    # ─── Fail on High Risk ──────────────────────────────────────────────────────
    - name: Check risk level
      if: inputs.dry-run != 'true'
      shell: bash
      id: risk-check
      run: |
        RISK="${{ steps.analysis.outputs.risk_level }}"
        HAS_OPENAPI_BREAKING="${{ steps.openapi.outputs.has_breaking || 'false' }}"

        if [ "${{ inputs.fail-on-critical }}" == "true" ] && [ "$RISK" == "CRITICAL" ]; then
          echo "FAIL_REASON=CRITICAL risk level detected" >> $GITHUB_OUTPUT
          echo "should_fail=true" >> $GITHUB_OUTPUT
        elif [ "${{ inputs.fail-on-high }}" == "true" ] && [ "$RISK" == "HIGH" ]; then
          echo "FAIL_REASON=HIGH risk level detected" >> $GITHUB_OUTPUT
          echo "should_fail=true" >> $GITHUB_OUTPUT
        elif [ "$HAS_OPENAPI_BREAKING" == "true" ]; then
          echo "FAIL_REASON=OpenAPI breaking changes detected" >> $GITHUB_OUTPUT
          echo "should_fail=true" >> $GITHUB_OUTPUT
        else
          echo "should_fail=false" >> $GITHUB_OUTPUT
        fi

    - name: Dry run summary
      if: inputs.dry-run == 'true'
      shell: bash
      run: |
        echo "🔍 DRY RUN COMPLETE"
        echo "   Risk level: ${{ steps.analysis.outputs.risk_level }}"
        echo "   Files changed: ${{ steps.analysis.outputs.files_changed }}"
        echo "   Breaking changes: ${{ steps.analysis.outputs.breaking_count }}"
        echo ""
        echo "✅ No comments posted (DRY RUN mode)"

    - name: Fail workflow if high risk
      if: inputs.dry-run != 'true' && steps.risk-check.outputs.should_fail == 'true'
      shell: bash
      run: |
        echo "❌ PR Review failed: ${{ steps.risk-check.outputs.FAIL_REASON }}"
        exit 1
