name: Nightly Build & Thorough Testing

on:
  schedule:
    - cron: '0 0 * * *' # Run every night at midnight UTC
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  # ═══════════════════════════════════════════════════════════
  # JOB 1: E2E Playwright Tests
  # ═══════════════════════════════════════════════════════════
  e2e-playwright:
    name: E2E Playwright Testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Node Tests
        run: |
          npm test
          npm --prefix src/cli test

  # ═══════════════════════════════════════════════════════════
  # JOB 2: Mutation Testing (TypeScript & Python)
  # ═══════════════════════════════════════════════════════════
  mutation-testing:
    name: Mutation Testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- TypeScript Mutation Test (Stryker) ---
      - name: Setup Node.js for Stryker
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Node dependencies
        run: npm ci

      - name: Run Stryker Mutation Testing
        run: npx stryker run
        working-directory: mcp

      - name: Upload Stryker Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stryker-mutation-report
          path: mcp/reports/mutation/
          retention-days: 14

      # --- Python Mutation Test (mutmut) ---
      - name: Set up Python for mutmut
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest hypothesis mutmut
          if [ -f requirements-local-memory.txt ]; then pip install -r requirements-local-memory.txt; fi

      - name: Run mutmut Mutation Testing
        run: mutmut run
        continue-on-error: true # Mutmut might have surviving mutants, don't fail the build

      - name: Export mutmut results to HTML
        run: |
          pip install junit2html || true
          mutmut junitxml > mutmut-results.xml || true
