name: Nightly Build & Thorough Testing

on:
  schedule:
    - cron: "0 0 * * *" # Run every night at midnight UTC
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  # ═══════════════════════════════════════════════════════════
  # JOB 1: E2E Playwright Tests
  # ═══════════════════════════════════════════════════════════
  e2e-playwright:
    name: E2E Playwright Testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Node Tests
        run: |
          npm test
          npm --prefix src/cli test

  # ═══════════════════════════════════════════════════════════
  # JOB 2: Mutation Testing (TypeScript & Python)
  # ═══════════════════════════════════════════════════════════
  mutation-testing:
    name: Mutation Testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # --- TypeScript Mutation Test (Stryker) ---
      - name: Setup Node.js for Stryker
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install Node dependencies
        run: npm ci

      - name: Run Stryker Mutation Testing
        run: npx --yes @stryker-mutator/core@9.6.1 run
        working-directory: mcp

      - name: Upload Stryker Report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: stryker-mutation-report
          path: mcp/reports/mutation/
          retention-days: 14

      # --- Python Mutation Test (mutmut) ---
      - name: Set up Python for mutmut
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --requirement requirements-ci.txt

      - name: Run mutmut Mutation Testing
        run: mutmut run
        continue-on-error: true # Mutmut might have surviving mutants, don't fail the build

      - name: Export mutmut results to HTML
        run: |
          python -m pip install --requirement requirements-ci.txt
          mutmut junitxml > mutmut-results.xml || true
