name: Forgewright Zero-Cost Test Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-suite:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: 'npm'

    - name: Verify Wiki & Code Consistency
      run: bash scripts/verify-wiki-drift.sh --threshold 0.3

    - name: Install dependencies
      run: npm ci

    - name: Run Unit & Integration Tests
      run: |
        npm test
        npm --prefix src/cli test
