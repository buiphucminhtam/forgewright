name: Forgewright Zero-Cost Test Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-suite:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: 'npm'

    - name: Verify Wiki & Code Consistency
      run: bash scripts/verify-wiki-drift.sh --threshold 0.3

    - name: Install dependencies
      run: npm ci

    - name: Run Unit & Integration Tests
      run: npm run test:unit --if-present

    - name: Run E2E & Visual VRT via Playwright Docker
      run: |
        docker run --rm \
          -v $(pwd):/work/ \
          -w /work/ \
          mcr.microsoft.com/playwright:v1.45.0-jammy \
          npx playwright test --project=chromium --grep-invert=@mobile-native --if-present

    - name: Run Accessibility Audits
      run: npm run test:a11y --if-present

    - name: Upload Test Artifacts
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: .playwright/reports/
        retries: 1
