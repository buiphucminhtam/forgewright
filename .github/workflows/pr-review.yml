name: ForgeNexus PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      base_ref:
        description: 'Base branch to compare against'
        required: false
        default: ''
      dry_run:
        description: 'Dry run mode (no actual posting)'
        required: false
        default: 'false'
        type: boolean

jobs:
  forge-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      statuses: write
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ForgeNexus
        run: npm install -g forgenexus

      - name: Analyze PR Blast Radius
        id: blast-radius
        run: |
          BASE_REF="${{ github.base_ref }}"
          if [ -n "${{ inputs.base_ref }}" ]; then
            BASE_REF="${{ inputs.base_ref }}"
          fi
          echo "base_ref=$BASE_REF" >> $GITHUB_OUTPUT
          
          DRY_RUN=""
          if [ "${{ inputs.dry_run }}" == "true" ]; then
            DRY_RUN="--dry-run"
            echo "mode=DRY_RUN" >> $GITHUB_OUTPUT
          else
            echo "mode=LIVE" >> $GITHUB_OUTPUT
          fi
          
          echo "Running ForgeNexus PR Review..."
          REPORT=$(npx forgenexus pr-review "$BASE_REF" HEAD $DRY_RUN 2>&1 || echo "⚠️ ForgeNexus analysis skipped — index may be stale or unavailable")
          echo "report=$REPORT" >> $GITHUB_OUTPUT

      - name: Post PR Comment
        if: github.event_name != 'workflow_dispatch' || inputs.dry_run != true
        uses: actions/github-script@v7
        with:
          script: |
            const report = `${{ steps.blast-radius.outputs.report }}`;
            const baseRef = `${{ steps.blast-radius.outputs.base_ref }}`;
            
            const body = [
              `## 🔍 ForgeNexus PR Review — Blast Radius Analysis`,
              ``,
              `**Base:** \`${baseRef}\` → **HEAD**`,
              ``,
              `<details>`,
              `<summary>📊 Full Report (click to expand)</summary>`,
              ``,
              `\`\`\``,
              report,
              `\`\`\``,
              `</details>`,
              ``,
              `---`,
              `*🤖 Generated by ForgeNexus | [Configure](https://github.com/buiphucminhtam/forgewright/wiki/ForgeNexus-Enterprise) | [View Docs](https://github.com/buiphucminhtam/forgewright/wiki)*`,
            ].join('\n');
            
            // Find existing ForgeNexus comment
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });
            
            const existingComment = comments.data.find(c => 
              c.user.login === 'github-actions[bot]' && 
              c.body.includes('ForgeNexus PR Review')
            );
            
            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: body,
              });
              console.log('Updated existing ForgeNexus comment');
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: body,
              });
              console.log('Created new ForgeNexus comment');
            }

  # ─── OpenAPI Contract Check (if OpenAPI files exist) ────────────────────────
  openapi-check:
    runs-on: ubuntu-latest
    # Skip this job in dry-run mode
    if: github.event_name != 'workflow_dispatch' || inputs.dry_run != true
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find OpenAPI specs
        id: find-specs
        run: |
          SPECS=$(find . -name "*.yaml" -o -name "*.yml" | grep -E "(openapi|swagger|api)" | head -10 || echo "")
          echo "specs=$SPECS" >> $GITHUB_OUTPUT
          
          if [ -z "$SPECS" ]; then
            echo "No OpenAPI specs found — skipping contract check"
          else
            echo "Found OpenAPI specs:"
            echo "$SPECS"
          fi

      - name: Run oasdiff breaking changes
        if: steps.find-specs.outputs.specs != ''
        run: |
          curl -sSL https://raw.githubusercontent.com/oasdiff/oasdiff/main/get.sh | bash -s -- -b v1.0.0
          
          BASE_REF="${{ github.base_ref }}"
          echo "Checking breaking changes against $BASE_REF..."
          
          for spec in ${{ steps.find-specs.outputs.specs }}; do
            echo "Checking: $spec"
            oasdiff breaking \
              "origin/$BASE_REF:$spec" \
              "HEAD:$spec" \
              --format markdown \
              || echo "No breaking changes or spec not found in base"
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post Contract Check Result
        if: steps.find-specs.outputs.specs != ''
        uses: actions/github-script@v7
        with:
          script: |
            const specs = `${{ steps.find-specs.outputs.specs }}`.split('\n').filter(Boolean);
            const body = [
              `## 📋 OpenAPI Contract Check`,
              ``,
              `**Specs checked:** ${specs.length}`,
              ``,
              `<details>`,
              `<summary>ℹ️ View contract details</summary>`,
              ``,
              `Run \`oasdiff\` in CI for detailed breaking change analysis.`,
              `</details>`,
              ``,
              `---`,
              `*🤖 Generated by ForgeNexus | [oasdiff](https://oasdiff.com)*`,
            ].join('\n');
            
            // Append to existing ForgeNexus comment or create new
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });
            
            const existingComment = comments.data.find(c => 
              c.user.login === 'github-actions[bot]' && 
              c.body.includes('ForgeNexus PR Review')
            );
            
            if (existingComment) {
              const updatedBody = existingComment.body.replace(
                /(\n---\n\*🤖.*\*)$/,
                '\n\n' + body.split('---')[1]
              );
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: updatedBody,
              });
            }
