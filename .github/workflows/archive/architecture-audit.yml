name: Quarterly Architecture Audit

on:
  schedule:
    # Run at 00:00 on the 1st day of January, April, July, and October.
    - cron: '0 0 1 1,4,7,10 *'
  workflow_dispatch: # Allow manual triggering

jobs:
  create-audit-issue:
    name: Create Architecture Audit Issue
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Create Architecture Audit Issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let bodyContent = "Please review the quarterly architecture audit checklist.\n\n";
            try {
              bodyContent += fs.readFileSync('docs/process/architecture-audit.md', 'utf8');
            } catch (err) {
              bodyContent += "Error loading docs/process/architecture-audit.md. Please manually refer to the checklist in the repository.";
            }
            
            const dateStr = new Date().toISOString().split('T')[0];
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Quarterly Architecture Audit - ${dateStr}`,
              body: bodyContent,
              labels: ['audit', 'architecture', 'quality']
            });
