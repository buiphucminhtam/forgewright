# Unity CI/CD Pipeline with Test Framework Integration
name: Unity Tests & Build

on:
  push:
    branches: [main, develop]
    paths:
      - '**.cs'
      - '**.asmdef'
      - '**.unity'
      - '**.asset'
      - 'Packages/manifest.json'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  UNITY_VERSION: 2022.3.40f1
  PROJECT_PATH: .
  TEST_RESULTS_EDIT: edit-test-results
  TEST_RESULTS_PLAY: play-test-results

jobs:
  # ============================================
  # JOB 1: EditMode Tests (Fast)
  # ============================================
  editmode-tests:
    name: EditMode Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find Unity
        id: find-unity
        run: |
          unity_paths=$(find /home/runner -name "Unity*" -type d 2>/dev/null | head -5)
          if [ -n "$unity_paths" ]; then
            echo "Found Unity at: $unity_paths"
            echo "unity_path=$unity_paths" >> $GITHUB_OUTPUT
          else
            echo "unity_path=" >> $GITHUB_OUTPUT
          fi

      - name: Unity Activate
        uses: game-ci/unity-activate@v4
        with:
          unity Licence: ${{ secrets.UNITY_LICENSE }}
          username: ${{ secrets.UNITY_USERNAME }}
          password: ${{ secrets.UNITY_PASSWORD }}

      - name: Run EditMode Tests
        uses: game-ci/unity-test-runner@v4
        with:
          projectPath: ${{ env.PROJECT_PATH }}
          testMode: EditMode
          artifactsPath: ${{ env.TEST_RESULTS_EDIT }}

      - name: Upload EditMode Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: editmode-test-results
          path: ${{ env.TEST_RESULTS_EDIT }}/**
          retention-days: 30

  # ============================================
  # JOB 2: PlayMode Tests (Slower)
  # ============================================
  playmode-tests:
    name: PlayMode Tests
    runs-on: ubuntu-latest
    needs: editmode-tests
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unity Activate
        uses: game-ci/unity-activate@v4
        with:
          unity Licence: ${{ secrets.UNITY_LICENSE }}
          username: ${{ secrets.UNITY_USERNAME }}
          password: ${{ secrets.UNITY_PASSWORD }}

      - name: Run PlayMode Tests
        uses: game-ci/unity-test-runner@v4
        with:
          projectPath: ${{ env.PROJECT_PATH }}
          testMode: PlayMode
          artifactsPath: ${{ env.TEST_RESULTS_PLAY }}

      - name: Upload PlayMode Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playmode-test-results
          path: ${{ env.TEST_RESULTS_PLAY }}/**
          retention-days: 30

  # ============================================
  # JOB 3: Build (Only on main branch)
  # ============================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [editmode-tests, playmode-tests]
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unity Activate
        uses: game-ci/unity-activate@v4
        with:
          unity Licence: ${{ secrets.UNITY_LICENSE }}
          username: ${{ secrets.UNITY_USERNAME }}
          password: ${{ secrets.UNITY_PASSWORD }}

      - name: Build Linux
        uses: game-ci/unity-builder@v4
        with:
          projectPath: ${{ env.PROJECT_PATH }}
          buildTarget: linux64
          buildName: MyGame-Linux
          versioning: Semantic
          androidKeystoreName: ${{ secrets.ANDROID_KEYSTORE_NAME }}
          androidKeystoreBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          androidKeystorePass: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          androidKeyaliasName: ${{ secrets.ANDROID_KEYALIAS_NAME }}
          androidKeyaliasPass: ${{ secrets.ANDROID_KEYALIAS_PASS }}

      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: build-linux
          path: build/linux64/**
          retention-days: 7

  # ============================================
  # JOB 4: Code Quality (Optional)
  # ============================================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: editmode-tests
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Count C# Files
        run: |
          total=$(find . -name "*.cs" -not -path "*/Tests/*" -not -path "*/Editor/*" | wc -l)
          echo "Production C# files: $total"

      - name: Check Test Coverage
        run: |
          test_files=$(find . -name "*Tests.cs" | wc -l)
          echo "Test files: $test_files"

      - name: Summary
        run: |
          echo "## Unity Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| EditMode Tests | ${{ needs.editmode-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| PlayMode Tests | ${{ needs.playmode-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
