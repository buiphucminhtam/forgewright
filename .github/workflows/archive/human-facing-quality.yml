name: Human-Facing Quality Gates

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  docs-source:
    name: Docs Source Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Linting Tools
        run: npm install -g markdownlint-cli2 linkinator cspell
      - name: Markdown Lint
        run: markdownlint-cli2 'docs/**/*.md' README.md || (echo "::error::Markdown lint failed. Fix formatting." && exit 1)
      - name: Check for Absolute User Paths
        run: |
          if git ls-files -z | xargs -0 rg -n '/Users/|file:[/\\]{1,2}[A-Za-z]:?[/\\]' --glob '*.md'; then
            echo "::error::Absolute user paths found in documentation. Use repository-relative paths."
            exit 1
          fi
      - name: Spell Check
        run: cspell "docs/**/*.md" "README.md" --no-progress || (echo "::warning::Spelling issues found." && exit 0)
      - name: Link Validation
        run: linkinator docs/ --recurse --skip "^http" || (echo "::error::Broken relative links found." && exit 1)

  architecture:
    name: Architecture Diagram Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Verify HTML+CSS Diagrams Only
        run: |
          if rg '[┌┐└┘│─▶▼▲]|^```(?:text)?$' docs/architecture.md; then
            echo "::error::ASCII/Mermaid diagrams found in docs/architecture.md. Use semantic HTML+CSS."
            exit 1
          fi
      - name: Run HTML Validity & Accessibility Checks
        run: |
          if [ -f "scripts/docs/check-architecture-diagrams.mjs" ]; then
            node scripts/docs/check-architecture-diagrams.mjs || (echo "::error::Architecture diagram checks failed." && exit 1)
          else
            echo "::warning::scripts/docs/check-architecture-diagrams.mjs not found. Skipping detailed check."
          fi
      # Placeholder for visual regression tests (VRT) / responsive screenshots

  readme:
    name: README Constraints
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Line Count Check
        run: |
          LINES=$(wc -l < README.md)
          if [ "$LINES" -lt 450 ] || [ "$LINES" -gt 550 ]; then
            echo "::error::README.md must be between 450 and 550 lines. Current lines: $LINES"
            exit 1
          fi
      - name: Run README Script Checks
        run: |
          if [ -f "scripts/readme-check.sh" ]; then
            bash scripts/readme-check.sh || (echo "::error::README structure/smoke checks failed." && exit 1)
          else
            echo "::warning::scripts/readme-check.sh not found."
          fi

  catalogs:
    name: Catalog Drift & Schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Check Protocol Catalog
        run: |
          if [ -f "scripts/catalog/generate-protocol-catalog.mjs" ]; then
            node scripts/catalog/generate-protocol-catalog.mjs --check || (echo "::error::Protocol catalog is drifting or schema invalid. Regenerate." && exit 1)
          fi
      - name: Check Script Catalog
        run: |
          if [ -f "scripts/catalog/generate-script-catalog.mjs" ]; then
            node scripts/catalog/generate-script-catalog.mjs --check || (echo "::error::Script catalog is drifting. Regenerate." && exit 1)
          fi
      - name: Validate Protocol References
        run: |
          if [ -f "scripts/catalog/validate-protocols.mjs" ]; then
            node scripts/catalog/validate-protocols.mjs || (echo "::error::Protocol reference validation failed." && exit 1)
          fi

  scripts:
    name: Script Integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Executable Bits
        run: |
          find scripts -name "*.sh" -type f ! -executable -exec echo "::warning::Missing executable bit on {}" \;
      - name: Run Shellcheck
        run: shellcheck scripts/**/*.sh || (echo "::error::Shellcheck failed." && exit 1)
      - name: Run Script References Check
        run: |
          if [ -f "scripts/ci/check-script-references.mjs" ]; then
            node scripts/ci/check-script-references.mjs || (echo "::error::Orphaned or invalid scripts detected." && exit 1)
          fi

  security-scanner:
    name: Security Scanner Correctness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run Scanner Tests
        run: |
          npm ci || true
          npx tsx .forgewright/security/scanner.ts --files ".forgewright/security/**/*.ts" --output json || (echo "::error::Scanner unit/integration tests failed." && exit 1)

  portability:
    name: MCP Portability
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Check for Absolute Dependency Paths
        run: |
          if [ -f "scripts/ci/check-portable-paths.mjs" ]; then
            node scripts/ci/check-portable-paths.mjs || (echo "::error::Absolute dependency paths found in MCP package." && exit 1)
          fi
      - name: Test Relocated Install
        run: |
          if [ -d ".forgewright/mcp-server" ]; then
            mkdir -p /tmp/relocated-mcp
            cp -r .forgewright/mcp-server/* /tmp/relocated-mcp/
            cd /tmp/relocated-mcp
            npm ci || (echo "::error::MCP server failed to install in relocated directory." && exit 1)
            npm run start --if-present || (echo "::error::MCP server failed to start." && exit 1)
          else
            echo "::warning::.forgewright/mcp-server not found."
          fi

  truth-surface:
    name: Truth Surface & Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify Version Consistency
        run: |
          # Placeholder check for version consistency across docs/packages
          echo "Checking version truth surface..."
          # Fail if inconsistency found
      - name: Verify Metrics and Counts
        run: |
          # Placeholder for verifying script/skill/protocol counts match runtime
          echo "Verifying ecosystem metrics..."
