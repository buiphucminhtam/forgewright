name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  required-aggregate:
    name: Required Aggregate Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python test dependencies
        run: |
          python -m pip install --requirement requirements-ci.txt

      - name: Run all required checks
        run: bash scripts/ci/run-required-checks.sh

  cli-init-onboard-golden:
    name: CLI Init/Onboard Golden Path
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install clean-checkout dependencies
        run: npm ci

      - name: Run documented init/onboard workflow
        run: npm run test:golden

  runtime-mcp-smoke:
    name: Runtime MCP Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify canonical MCP stdio boundary
        run: node tests/golden/runtime-smoke.test.mjs

  # ═══════════════════════════════════════════════════════════
  # WAVE 1: MCP Package Checks (parallel)
  # ═══════════════════════════════════════════════════════════
  # ── Wave 1: All checks run in parallel (each installs deps independently) ──
  lint-and-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check ESLint
        run: npm run lint
        working-directory: mcp

      - name: Check Prettier
        run: npm run format:check
        working-directory: mcp

  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run build
        working-directory: mcp

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test
        working-directory: mcp

      - name: Upload coverage
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: coverage-report
          path: mcp/coverage/
          retention-days: 14

  # ── Wave 1: Commit message (parallel with other checks) ──
  commitlint:
    name: Commit Message
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate commit messages
        run: npx --yes @commitlint/cli@21.2.1 --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }}
        working-directory: mcp

  # ═══════════════════════════════════════════════════════════
  # WAVE 1: Wiki Drift & Conflict Check (parallel)
  # ═══════════════════════════════════════════════════════════
  wiki-drift-check:
    name: Wiki Drift & Conflict Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - name: Run Wiki Drift Check
        run: bash scripts/verify-wiki-drift.sh --threshold 0.3

  # ═══════════════════════════════════════════════════════════
  # WAVE 2: Coverage Gates (runs after test completes)
  # ═══════════════════════════════════════════════════════════
  # ── Wave 2: Depends on test, runs after test completes ──
  test-coverage:
    name: Coverage Gate
    runs-on: ubuntu-latest
    needs: [test]
    if: always()
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check coverage thresholds
        run: npm run test:coverage
        working-directory: mcp

      - name: Upload coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: full-coverage-report
          path: mcp/coverage/
          retention-days: 14

  # ═══════════════════════════════════════════════════════════
  # WAVE 1: Python Lint & Tests (parallel)
  # ═══════════════════════════════════════════════════════════
  python-tests:
    name: Python Lint & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --requirement requirements-ci.txt

      - name: Lint with Ruff
        run: ruff check .

      - name: Format check with Ruff
        run: ruff format --check .

      - name: Run pytest
        run: pytest tests/unit_tests/

  supply-chain-policy:
    name: Supply-chain Policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify policy tests and active workflows
        run: |
          node --test scripts/ci/release-supply-chain-policy.test.mjs
          node scripts/ci/verify-supply-chain-policy.mjs

  # ── Wave 2: All Wave 1 jobs must pass ──
  # This job exists to fail the overall workflow if any parallel job fails.
  # It doesn't need to run any commands — it just waits for its dependencies.
  require-all:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs:
      [
        required-aggregate,
        runtime-mcp-smoke,
        lint-and-format,
        typecheck,
        test,
        commitlint,
        wiki-drift-check,
        python-tests,
        supply-chain-policy,
      ]
    steps:
      - name: All checks passed
        run: echo "All CI checks passed"
