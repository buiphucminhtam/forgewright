name: ForgeNexus Multi-Repo Impact Analysis

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      group:
        description: 'Repository group to analyze'
        required: false
        default: ''
      symbol:
        description: 'Symbol name to analyze (e.g., validateUser, PaymentService)'
        required: false
        default: ''
      base_ref:
        description: 'Base branch to compare'
        required: false
        default: ''
      direction:
        description: 'Impact direction (upstream, downstream, both)'
        required: false
        default: 'upstream'
      dry_run:
        description: 'Dry run mode'
        required: false
        default: 'false'

concurrency:
  group: forge-impact-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── PR Blast Radius Analysis ──────────────────────────────────────────────
  pr-impact:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      risk_level: ${{ steps.impact.outputs.risk_level }}
      affected_repos: ${{ steps.impact.outputs.affected_repos }}
      affected_contracts: ${{ steps.impact.outputs.affected_contracts }}
      breaking_count: ${{ steps.impact.outputs.breaking_count }}
      status: ${{ steps.impact.outputs.status }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install ForgeNexus
        run: npm install -g forgenexus

      - name: Setup environment
        id: env
        run: |
          BASE_REF="${{ github.base_ref }}"
          if [ -n "${{ github.event.inputs.base_ref }}" ]; then
            BASE_REF="${{ github.event.inputs.base_ref }}"
          fi
          echo "base_ref=$BASE_REF" >> $GITHUB_OUTPUT

          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            echo "mode=DRY RUN" >> $GITHUB_OUTPUT
          else
            echo "mode=LIVE" >> $GITHUB_OUTPUT
          fi

      - name: Analyze PR Impact
        id: impact
        run: |
          echo "Analyzing blast radius for PR..."
          echo "Base: ${{ steps.env.outputs.base_ref }}"
          echo ""
          
          # Run PR Review (already includes blast radius analysis)
          REPORT=$(npx forgenexus pr-review "${{ steps.env.outputs.base_ref }}" HEAD 2>&1 || echo "Analysis unavailable")
          
          echo "$REPORT"
          
          # Extract key metrics
          if echo "$REPORT" | grep -q "CRITICAL"; then
            RISK="CRITICAL"
          elif echo "$REPORT" | grep -q "HIGH"; then
            RISK="HIGH"
          elif echo "$REPORT" | grep -q "MEDIUM"; then
            RISK="MEDIUM"
          else
            RISK="LOW"
          fi
          
          echo "risk_level=$RISK" >> $GITHUB_OUTPUT
          echo "affected_repos=1" >> $GITHUB_OUTPUT
          echo "affected_contracts=0" >> $GITHUB_OUTPUT
          echo "breaking_count=$(echo "$REPORT" | grep -c "Breaking" || echo 0)" >> $GITHUB_OUTPUT
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Post PR Comment
        if: steps.env.outputs.mode == 'LIVE'
        uses: actions/github-script@v7
        with:
          script: |
            const riskLevel = '${{ steps.impact.outputs.risk_level }}';
            const affectedRepos = '${{ steps.impact.outputs.affected_repos }}';
            const breakingCount = '${{ steps.impact.outputs.breaking_count }}';
            
            const riskEmoji = {
              'LOW': '🟢',
              'MEDIUM': '🟡',
              'HIGH': '🟠',
              'CRITICAL': '🔴'
            };
            
            const body = [
              `## 🔍 ForgeNexus Multi-Repo Impact Analysis`,
              ``,
              `| Metric | Value |`,
              `|--------|-------|`,
              `| Risk Level | ${riskEmoji[riskLevel] || '⚪'} **${riskLevel}** |`,
              `| Affected Repos | ${affectedRepos} |`,
              `| Breaking Changes | ${breakingCount} |`,
              ``,
              `---`,
              `*🤖 Generated by ForgeNexus*`,
            ].join('\n');
            
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });
            
            const existingComment = comments.data.find(c => 
              c.user.login === 'github-actions[bot]' && 
              c.body.includes('ForgeNexus Multi-Repo Impact')
            );
            
            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: body,
              });
            }

  # ─── Symbol Impact Analysis ──────────────────────────────────────────────
  symbol-impact:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.symbol != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      symbol: ${{ steps.impact.outputs.symbol }}
      callers: ${{ steps.impact.outputs.callers }}
      callees: ${{ steps.impact.outputs.callees }}
      depth: ${{ steps.impact.outputs.depth }}
      affected_repos: ${{ steps.impact.outputs.affected_repos }}
      status: ${{ steps.impact.outputs.status }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install ForgeNexus
        run: npm install -g forgenexus

      - name: Analyze Symbol Impact
        id: impact
        run: |
          SYMBOL="${{ github.event.inputs.symbol }}"
          DIRECTION="${{ github.event.inputs.direction || 'upstream' }}"
          GROUP="${{ github.event.inputs.group || '' }}"
          
          echo "Analyzing impact for symbol: $SYMBOL"
          echo "Direction: $DIRECTION"
          echo ""
          
          if [ -n "$GROUP" ]; then
            echo "Group: $GROUP"
            # Multi-repo analysis
            RESULT=$(npx forgenexus group query "$GROUP" "$SYMBOL" 2>&1 || echo "Group query unavailable")
          else
            # Single repo analysis
            RESULT=$(npx forgenexus impact "$SYMBOL" --direction "$DIRECTION" 2>&1 || echo "Impact analysis unavailable")
          fi
          
          echo "$RESULT"
          
          # Extract metrics
          CALLERS=$(echo "$RESULT" | grep -c "CALLER" || echo 0)
          CALLEES=$(echo "$RESULT" | grep -c "CALLEE" || echo 0)
          DEPTH=$(echo "$RESULT" | grep -oP 'd=\d' | head -1 || echo "d=1")
          
          echo "symbol=$SYMBOL" >> $GITHUB_OUTPUT
          echo "callers=$CALLERS" >> $GITHUB_OUTPUT
          echo "callees=$CALLEES" >> $GITHUB_OUTPUT
          echo "depth=$DEPTH" >> $GITHUB_OUTPUT
          echo "affected_repos=1" >> $GITHUB_OUTPUT
          echo "status=success" >> $GITHUB_OUTPUT

  # ─── Cross-Repo Dependency Analysis ──────────────────────────────────────
  cross-repo-deps:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.symbol == ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      repos: ${{ steps.deps.outputs.repos }}
      contracts: ${{ steps.deps.outputs.contracts }}
      links: ${{ steps.deps.outputs.links }}
      status: ${{ steps.deps.outputs.status }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install ForgeNexus
        run: npm install -g forgenexus

      - name: Analyze Cross-Repo Dependencies
        id: deps
        run: |
          GROUP="${{ github.event.inputs.group || 'default' }}"
          
          echo "Analyzing cross-repo dependencies for group: $GROUP"
          echo ""
          
          # Get contracts
          CONTRACTS=$(npx forgenexus group contracts "$GROUP" 2>&1 || echo "No contracts")
          echo "$CONTRACTS"
          
          # Get links
          LINKS=$(npx forgenexus group query "$GROUP" "*" 2>&1 || echo "No links")
          echo "$LINKS"
          
          # Count
          REPOS=$(echo "$CONTRACTS" | grep -c "^###" || echo 0)
          CONTRACT_COUNT=$(echo "$CONTRACTS" | grep -c "^-" || echo 0)
          LINK_COUNT=$(echo "$LINKS" | grep -c "^-" || echo 0)
          
          echo "repos=$REPOS" >> $GITHUB_OUTPUT
          echo "contracts=$CONTRACT_COUNT" >> $GITHUB_OUTPUT
          echo "links=$LINK_COUNT" >> $GITHUB_OUTPUT
          echo "status=success" >> $GITHUB_OUTPUT

  # ─── Summary ──────────────────────────────────────────────────────────────
  summary:
    needs: [pr-impact, symbol-impact, cross-repo-deps]
    runs-on: ubuntu-latest
    steps:
      - name: Generate Summary
        run: |
          echo "## 🔍 ForgeNexus Multi-Repo Impact Analysis"
          echo ""
          echo "| Analysis Type | Status |"
          echo "|--------------|--------|"
          
          if [ "${{ needs.pr-impact.result }}" != "skipped" ]; then
            echo "| PR Impact | ✅ |"
            echo "|   Risk Level | ${{ needs.pr-impact.outputs.risk_level }} |"
            echo "|   Affected Repos | ${{ needs.pr-impact.outputs.affected_repos }} |"
          fi
          
          if [ "${{ needs.symbol-impact.result }}" != "skipped" ]; then
            echo "| Symbol Impact | ✅ |"
            echo "|   Symbol | ${{ needs.symbol-impact.outputs.symbol }} |"
            echo "|   Callers | ${{ needs.symbol-impact.outputs.callers }} |"
            echo "|   Callees | ${{ needs.symbol-impact.outputs.callees }} |"
          fi
          
          if [ "${{ needs.cross-repo-deps.result }}" != "skipped" ]; then
            echo "| Cross-Repo Deps | ✅ |"
            echo "|   Repos | ${{ needs.cross-repo-deps.outputs.repos }} |"
            echo "|   Contracts | ${{ needs.cross-repo-deps.outputs.contracts }} |"
            echo "|   Links | ${{ needs.cross-repo-deps.outputs.links }} |"
          fi
          
          echo ""
          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            echo "🔍 **Dry Run Mode**"
          fi
